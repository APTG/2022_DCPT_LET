name: Validate manifests

on:
  push:
    paths:
      - "data/**/manifest.json"
      - "tools/manifest.schema.json"
      - "tools/validate_manifests.py"
  pull_request:
    paths:
      - "data/**/manifest.json"
      - "tools/manifest.schema.json"
      - "tools/validate_manifests.py"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install "jsonschema>=4.0"

      - name: Validate manifests
        run: python tools/validate_manifests.py
