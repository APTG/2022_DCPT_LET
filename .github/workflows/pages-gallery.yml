name: Pages Gallery

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-gallery
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy plotly pyyaml jsonschema matplotlib

      - name: Validate manifests
        run: python tools/validate_manifests.py

      - name: Generate comparison plots
        run: |
          python tools/generate_comparison_plots.py \
            --data-root data \
            --out-dir pages-site/plots \
            --min-codes 1

      - name: Build static Pages site
        run: |
          python tools/build_pages_site.py \
            --data-root data \
            --plots-dir pages-site/plots \
            --out-dir pages-site

      - name: Generate PDF report
        run: python tools/generate_pdf_report.py --out pages-site/report.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site

      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: pages-site-preview-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('run-{0}', github.run_number) }}
          path: pages-site
          if-no-files-found: error

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
