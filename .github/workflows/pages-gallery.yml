name: Pages Gallery

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-gallery
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install plotting dependencies
        run: python -m pip install --upgrade pip matplotlib numpy

      - name: Build comparison figures and PDF report
        run: |
          python tools/plot_sh12a_vs_osh.py \
            --out-dir .pages-build/comparisons/sh12a_vs_osh \
            --pdf-report .pages-build/reports/sh12a_vs_osh_report.pdf

      - name: Build static Pages site
        run: |
          python tools/build_pages_site.py \
            --comparison-root .pages-build/comparisons/sh12a_vs_osh \
            --pdf-root .pages-build/reports \
            --out-dir .pages-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
